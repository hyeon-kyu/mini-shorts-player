<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Shorts Player</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>Mini Shorts Player</h1>
      <p class="help">유튜브 쇼츠 링크를 붙여넣으면 미니 플레이어로 재생됩니다.</p>

      <form id="shorts-form" class="controls">
        <label for="shorts-url">Shorts URL</label>
        <input
          id="shorts-url"
          name="shorts-url"
          type="url"
          placeholder="https://www.youtube.com/shorts/VIDEO_ID"
          required
        />
        <button type="submit">재생</button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <section class="player-wrap">
        <iframe
          id="player"
          title="YouTube Shorts Player"
          src="about:blank"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>
    </main>

    <script src="popup.js" defer></script>
  </body>
</html>
